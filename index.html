<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="FieldIQ — College Football Data & Analytics" />
  <title>FieldIQ</title>

  <!-- --------------------------------------------------------
    CSS Load Order
    1. variables  — design tokens (must be first, everything depends on it)
    2. base       — reset, body defaults, fonts
    3. layout     — app shell, sidebar, topbar, page-content
    4. components — reusable UI pieces (cards, nav, chips, etc.)
  --------------------------------------------------------- -->
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />

  <!-- Leaflet — campus map (Phase 8). Must load before school.js. -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>

  <!-- ========================================================
    #app — Single mount point. All content is rendered here
    by the JS router. Nothing outside this div should change.
  ======================================================== -->
  <!-- Mosaic background — lives outside app-shell so it sits behind
       the entire viewport without being clipped by overflow:hidden -->
  <div id="mosaic-root"></div>

  <div id="app">

    <div class="app-shell">

      <!-- --------------------------------------------------
        Sidebar
        Contains the app logo/wordmark at the top, followed
        by the main navigation list. Nav items are populated
        by app.js at init time.
      --------------------------------------------------- -->
      <aside class="sidebar" id="sidebar">

        <!-- Logo / Wordmark area -->
        <div class="sidebar-logo" id="sidebar-logo">
          <span class="sidebar-logo-text">FieldIQ</span>
        </div>

        <!-- Primary navigation -->
        <nav class="sidebar-nav" id="sidebar-nav" aria-label="Main navigation">
          <!-- Nav items injected by app.js -->
        </nav>

      </aside>
      <!-- /sidebar -->

      <!-- --------------------------------------------------
        Main Content
        Flex column: topbar (fixed height) stacked above the
        scrollable page-content region.
      --------------------------------------------------- -->
      <div class="main-content" id="main-content">

        <!-- Topbar -->
        <header class="topbar" id="topbar">
          <!-- Breadcrumb / page title injected by router.js -->
          <span class="topbar-title" id="topbar-title"></span>
        </header>

        <!-- Season notice -->
        <div class="season-notice">Displaying 2025 season data &middot; Live stats return August 2026.</div>

        <!-- Page Content — router renders page views here -->
        <main class="page-content" id="page-content">
          <!-- Page views rendered by router.js -->
        </main>

      </div>
      <!-- /main-content -->

    </div>
    <!-- /app-shell -->

  </div>
  <!-- /#app -->

  <!-- --------------------------------------------------------
    JS Load Order
    1. leaflet  — campus map lib, global L must exist before school.js
    2. theme    — applyTheme() must be available before app init
    3. config   — CFBD_CONFIG.apiKey must exist before api.js runs
    4. api      — cfbdFetch() used by page modules
    5. router   — navigate() used by app.js and page modules
    6. home     — page module, must exist before router runs
    7. school   — page module, must exist before router runs
    8. app      — entry point, runs last after all deps are ready
  --------------------------------------------------------- -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="data/schools.js"></script>
  <script src="js/theme.js"></script>
  <script src="config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/dna.js"></script>
  <script src="js/gamecontrol.js"></script>
  <script src="js/situational.js"></script>
  <script src="js/market.js"></script>
  <script src="js/router.js"></script>
  <script src="pages/home.js"></script>
  <script src="pages/school.js"></script>
  <script src="pages/league.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
